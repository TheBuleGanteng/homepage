{% load static %}
<!DOCTYPE html>
<html lang="en">

    <head>
        <!-- google tag (gtag.js) -->
        <script async src="https://www.googletagmanager.com/gtag/js?id=G-62CJ8QX96T"></script>
        <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());

        gtag('config', 'G-62CJ8QX96T');
        </script>

        <meta charset="utf-8">
        <meta name="viewport" content="initial-scale=1, width=device-width">
        <!-- /google tag-->

        <!-- boostrap and custom CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
        <link rel='stylesheet' href='{% static "homepage/css/styles.css" %}'>
        <!-- /bootstrap and custom CSS-->

        <!-- bootstrap and custom JavaScript -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
        <!-- /bootstrap and custom JavaScript-->

        <!-- substack JavaScript feed. See https://substackapi.com/feed -->       
        <script>
         window.SubstackFeedWidget = {
           substackUrl: "matthewmcdonnell.substack.com",
           posts: 3
         };
         document.getElementById("p2").style.color = "red";
         document.getElementById(".substack-feed-widget").style.color = "#212529";
        </script>
        <script src="https://substackapi.com/embeds/feed.js" async></script>
        <!-- /substack JavaScript feed -->

        <!-- contact form email JavaScript. See https://youtu.be/sGQSz22U8VM?si=nkiRhyzAeqK7NV4k -->
        <script>src="https://smtpjs.com/v3/smtp.js"</script>
        <!-- /contact form email JavaScript --> 

        <!-- favicon -->
        <link rel='icon' type='image/x-icon' href='{% static "homepage/assets/profile_logo.jpg" %}'>
        <!-- favicon -->

        <!-- jinja: title -->
        {% block title %}{% endblock %}
        <!-- /jinja: title -->        
    </head>

    <body>

        <!-- navbar -->
        <nav class='navbar navbar-light bg-light'>
            <div class='container-fluid'>
                <div class='row align-items-center'>
                    <a class='navbar-brand' href='{% url "homepage:index" %}'>
                        <img src='{% static "homepage/assets/profile_logo.jpg" %}' alt='profile logo' class='fixed-height-img-60px'>
                        Matt McDonnell, CFA
                    </a>
                </div>
            </div>
        </nav>
        <!-- /navbar -->

        <!-- Allows for flash functionality. -->
        <header>
            <div class="alert alert-primary mb-0 text-center" role="alert">
                {% for message in messages %}
                    {{ message }}
                {% endfor %}
            </div>
        </header>

        <!-- Block for page's main content, as populates on the respective page's html -->
        <main class="container-fluid vh-100 text-center">
            {% block main %}{% endblock %}
        </main>

        <!-- Footer -->
        <footer class="fixed-bottom text-center border-top tb-light pt-2 pb-2 ps-2">
            <div class="d-flex justify-content-between">
                <div>
                    <h6 class="mb-0">Matthew McDonnell, CFA - 2023</h6>
                </div>
                <div>
                    <a href="/sitemap" style="font-size: xx-small; color: rgb(40, 40, 40);">Site Map</a>
                </div>
            </div>
        </footer>
    </body>
</html>
